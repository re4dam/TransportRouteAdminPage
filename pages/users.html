<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="../icon.svg" />
    <title>User Management - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- The UI is hidden by default until JS verifies the session -->
    <div id="dashboardUI" class="hidden">
        
        <!-- Reusable Navbar -->
        <nav class="bg-white border-b border-gray-200 sticky top-0 z-50 shadow-sm">
            <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
                <a href="../index.html" class="text-xl font-black text-gray-900 tracking-tight flex items-center gap-2">
                    <div class="bg-purple-600 text-white p-1.5 rounded-lg shadow-sm">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>
                    </div>
                    Home
                </a>
                
                <button id="logoutBtn" class="px-4 py-2 rounded-md font-medium text-sm text-red-600 hover:bg-red-50 transition-all border border-transparent hover:border-red-100">
                    Log Out
                </button>
            </div>
        </nav>

        <main class="max-w-5xl mx-auto px-6 py-8">
            <div class="mb-6 flex flex-col gap-4 sm:flex-row sm:justify-between sm:items-end">
                <div>
                    <h1 class="text-2xl font-bold text-gray-800">User Management</h1>
                    <p class="text-sm text-gray-500 mt-1">Manage account access, roles, and suspension status.</p>
                </div>
                <button onclick="toggleCreateForm()" id="showCreateBtn" class="bg-indigo-600 text-white px-4 py-2 rounded-md hover:bg-indigo-700 transition-colors hidden">
                    + Create New User
                </button>
            </div>

            <div id="createUserForm" class="hidden bg-gray-50 p-6 rounded-lg border border-gray-200 mb-8">
                <h3 class="text-lg font-bold mb-4">Provision New Account</h3>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <input type="text" id="newUsername" placeholder="Username" class="border p-2 rounded w-full">
                    <input type="email" id="newEmail" placeholder="Email" class="border p-2 rounded w-full">
                    <input type="password" id="newPassword" placeholder="Temporary Password" class="border p-2 rounded w-full">
                    <select id="newRole" class="border p-2 rounded w-full">
                        <option value="User">User</option>
                        <option value="RouteManager">Route Manager</option>
                        <option value="SuperAdmin">Super Admin</option>
                    </select>
                </div>
                <div class="mt-4 flex justify-end space-x-2">
                    <button onclick="toggleCreateForm()" class="px-4 py-2 text-gray-600 hover:text-gray-900">Cancel</button>
                    <button onclick="provisionUser()" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">Create Account</button>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                <div class="overflow-x-auto">
                <table class="w-full min-w-[720px] text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 border-b border-gray-200 text-gray-600 text-sm sticky top-0 z-10">
                            <th class="py-3 px-6 font-semibold w-16">#</th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Username</th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Role</th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody" class="divide-y divide-gray-100">
                        <!-- Data injected here -->
                    </tbody>
                </table>
                </div>
            </div>
        </main>
    </div>

    <div id="editModalBackdrop" class="fixed inset-0 bg-gray-900 bg-opacity-50 backdrop-blur-sm hidden flex items-center justify-center z-[100]">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-md p-6 transform transition-all">
            <h3 class="text-xl font-bold text-gray-900 mb-4">Edit User Role</h3>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                    <!-- Disabled input to show context but prevent editing -->
                    <input type="text" id="editUsername" disabled class="w-full px-4 py-2 bg-gray-100 border border-gray-300 rounded-lg text-gray-500 cursor-not-allowed">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">System Role</label>
                    <select id="editRole" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-600 focus:border-purple-600 outline-none transition-all cursor-pointer">
                        <option value="User">Standard User</option>
                        <option value="RouteManager">Route Manager</option>
                        <option value="SuperAdmin">Super Admin</option>
                    </select>
                </div>
            </div>

            <div class="mt-6 flex justify-end gap-3">
                <button onclick="closeEditModal()" class="px-4 py-2 rounded-lg font-medium text-gray-600 hover:bg-gray-100 transition-colors">Cancel</button>
                <button onclick="submitEdit()" class="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded-lg font-medium transition-colors shadow-sm">Save Changes</button>
            </div>
        </div>
    </div>

    <div id="deleteModalBackdrop" class="fixed inset-0 bg-gray-900 bg-opacity-50 backdrop-blur-sm hidden flex items-center justify-center z-[100]">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-sm p-6 text-center transform transition-all">
            <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-red-100 mb-4">
                <svg class="h-6 w-6 text-red-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                </svg>
            </div>
            <h3 class="text-lg font-bold text-gray-900 mb-2">Delete User?</h3>
            <p class="text-sm text-gray-500 mb-6">Are you sure you want to delete <strong id="deleteTargetName" class="text-gray-800"></strong>? This action cannot be undone.</p>
            
            <div class="flex justify-center gap-3">
                <button onclick="closeDeleteModal()" class="px-4 py-2 rounded-lg font-medium text-gray-600 hover:bg-gray-100 transition-colors w-full border border-gray-200">Cancel</button>
                <button onclick="confirmDelete()" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg font-medium transition-colors shadow-sm w-full">Delete</button>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="fixed top-5 right-5 z-[200] flex flex-col gap-3 pointer-events-none"></div>

    <script src="../js/shared/config.js"></script>
    <script src="../js/shared/ui.js"></script>

    <script src="../js/users.js?v=6"></script>
</body>
</html>
