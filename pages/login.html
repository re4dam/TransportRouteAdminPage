<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - User Management</title>
    <link rel="icon" type="image/svg+xml" href="../icon.svg" />
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen flex-col">

    <a href="index.html" class="mb-8 text-sm font-medium text-gray-500 hover:text-purple-600 transition-colors">
        &larr; Back to Home
    </a>

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md border border-gray-100">
        <h2 class="text-2xl font-black text-gray-900 mb-6 text-center tracking-tight">Admin Authentication</h2>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <input type="text" id="username" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-600 focus:border-purple-600 outline-none" placeholder="Enter admin username">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" id="password" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-600 focus:border-purple-600 outline-none" placeholder="••••••••">
            </div>

            <button id="loginBtn" class="w-full bg-purple-600 text-white font-bold py-2.5 rounded-lg hover:bg-purple-700 shadow-sm mt-2">
                Authenticate
            </button>
        </div>

        <p id="statusMessage" class="mt-4 text-center text-sm font-bold hidden"></p>
    </div>

    <script src="../js/shared/config.js"></script>
    <script src="../js/shared/ui.js"></script>
    
    <script src="../js/login.js"></script>
</body>
</html>
